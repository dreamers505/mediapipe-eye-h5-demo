<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>MediaPipe Eye Snap Demo</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="camera-panel">
        <video id="video" class="video" autoplay playsinline muted></video>
        <canvas id="overlay" class="overlay"></canvas>
        <div class="badge" id="status">Loading model</div>
      </section>

      <section class="workspace">
        <header class="header">
          <div>
            <h1>Eye snap</h1>
            <p id="hint">Use your gaze like a remote: look left/right/up/down to move one cell.</p>
          </div>
          <button id="startButton" class="primary">Start</button>
        </header>

        <section class="grid-wrap">
          <div id="cursor" class="cursor"><span></span></div>
          <div class="grid" id="grid">
            <button data-cell="1">1</button>
            <button data-cell="2">2</button>
            <button data-cell="3">3</button>
            <button data-cell="4">4</button>
            <button data-cell="5" class="active">5</button>
            <button data-cell="6">6</button>
            <button data-cell="7">7</button>
            <button data-cell="8">8</button>
            <button data-cell="9">9</button>
          </div>
        </section>

        <section class="calibration">
          <div class="section-title">Calibration</div>
          <div class="calibration-buttons">
            <button data-calibrate="center">Center</button>
            <button data-calibrate="left">Left</button>
            <button data-calibrate="right">Right</button>
            <button data-calibrate="up">Up</button>
            <button data-calibrate="down">Down</button>
            <button id="resetCalibration">Reset</button>
          </div>
        </section>

        <section class="intent">
          <div class="section-title">Intent</div>
          <div class="intent-row">
            <div id="intentText" class="intent-text">center</div>
            <div class="intent-track"><div id="intentFill" class="intent-fill"></div></div>
          </div>
        </section>

        <section class="metrics">
          <div><span>FPS</span><strong id="fps">0</strong></div>
          <div><span>Landmarks</span><strong id="landmarks">0</strong></div>
          <div><span>Iris</span><strong id="iris">No</strong></div>
          <div><span>Cell</span><strong id="cell">5</strong></div>
          <div><span>X</span><strong id="xValue">0.50</strong></div>
          <div><span>Y</span><strong id="yValue">0.50</strong></div>
        </section>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
