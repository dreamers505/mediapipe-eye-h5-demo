<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>MediaPipe Hand Cursor Demo</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="camera-panel">
        <video id="video" class="video" autoplay playsinline muted></video>
        <canvas id="overlay" class="overlay"></canvas>
        <div class="badge" id="status">Loading model</div>
      </section>

      <section class="workspace">
        <header class="header">
          <div>
            <h1>Body cursor</h1>
            <p id="hint">Use your index finger or nose as the cursor. Pinch or dwell to select.</p>
          </div>
          <div class="header-actions">
            <button id="modeButton" class="secondary">Hand</button>
            <button id="startButton" class="primary">Start</button>
          </div>
        </header>

        <section class="grid-wrap">
          <div id="centerTarget" class="center-target"></div>
          <div id="cursor" class="cursor"><span></span></div>
          <div class="grid" id="grid">
            <button data-cell="1">1</button>
            <button data-cell="2">2</button>
            <button data-cell="3">3</button>
            <button data-cell="4">4</button>
            <button data-cell="5" class="active">5</button>
            <button data-cell="6">6</button>
            <button data-cell="7">7</button>
            <button data-cell="8">8</button>
            <button data-cell="9">9</button>
          </div>
        </section>

        <section class="intent">
          <div class="section-title" id="actionTitle">Pinch</div>
          <div class="intent-row">
            <div id="actionText" class="intent-text">open</div>
            <div class="intent-track"><div id="actionFill" class="intent-fill"></div></div>
          </div>
        </section>

        <section class="nose-controls">
          <div class="section-title">Nose tuning</div>
          <div class="tuning-grid">
            <button id="noseCenter">Recenter</button>
            <button id="noseLess">Less</button>
            <button id="noseMore">More</button>
          </div>
        </section>

        <section class="metrics">
          <div><span>FPS</span><strong id="fps">0</strong></div>
          <div><span>Points</span><strong id="landmarks">0</strong></div>
          <div><span>Action</span><strong id="action">No</strong></div>
          <div><span>Cell</span><strong id="cell">5</strong></div>
          <div><span>X</span><strong id="xValue">0.50</strong></div>
          <div><span>Y</span><strong id="yValue">0.50</strong></div>
        </section>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
